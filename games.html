<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A dynamic and interactive Word Play Game and Quiz Feature for the Local Language Translator.">
    <title>Lok Vaani - Word Play</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="game-container">
        <header class="app-header">
            <h1>Lok Vaani <span class="accent">Play & Explore</span></h1>
            <p>Master local languages & discover India with interactive apps</p>
        </header>

        <nav class="app-nav">
            <ul>
                <li><a href="translation.html">Translator</a></li>
                <li><a href="#" class="active">Game Feature</a></li>
            </ul>
        </nav>

        <!-- GAME SECTION -->
        <div id="game-section" class="glass-panel main-panel">
            <nav class="mode-selector">
                <button id="btn-mode-1" class="mode-btn active" onclick="switchMode('1')">
                    <span class="icon">🎮</span> Mode 1: Guess Translation
                </button>
                <button id="btn-mode-2" class="mode-btn" onclick="switchMode('2')">
                    <span class="icon">✍️</span> Mode 2: Word Quiz
                </button>
            </nav>

            <div class="game-stats">
                <div class="score-card">
                    <span class="label">Score</span>
                    <span id="score" class="value">0</span>
                </div>
                <!-- Optional timer, hidden for now, can be activated -->
                <div class="timer-card hidden" id="timer-container">
                    <span class="label">Time</span>
                    <span id="timer" class="value">00:00</span>
                </div>
            </div>

            <div id="game-area" class="game-area transition-active">
                <!-- Content will be dynamically inserted here by JS -->
                <div class="loader">Loading...</div>
            </div>

            <div id="feedback-area" class="feedback-area hidden">
                <p id="feedback-message" class="feedback-msg"></p>
                <button id="next-btn" class="primary-btn" onclick="loadNextQuestion()">Next Question ➔</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
